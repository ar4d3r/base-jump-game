<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دایناسور کروم روی شبکه Base</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: monospace;
            text-align: center;
            background-color: #f7f7f7;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 150px;
            background-color: #fff;
            border-bottom: 2px solid #535353;
            margin: 20px auto;
            overflow: hidden;
        }
        /* ظاهر دایناسور پیکسلی */
        #dino {
            position: absolute;
            width: 20px;
            height: 40px;
            background-color: #535353;
            bottom: 0;
            left: 40px;
        }
        /* ظاهر کاکتوس */
        #cactus {
            position: absolute;
            width: 15px;
            height: 35px;
            background-color: #535353;
            bottom: 0;
            right: -20px;
        }
        .jump {
            animation: jump-anim 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes jump-anim {
            0% { bottom: 0; }
            50% { bottom: 80px; }
            100% { bottom: 0; }
        }
        #status-box {
            margin: 15px auto;
            padding: 10px;
            width: 580px;
            background: #eef;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn-connect {
            background-color: #0052FF;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }
        #score-board { font-size: 20px; font-weight: bold; margin-top: 10px; }
        #tx-log { color: #0052FF; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>T-Rex Base Runner 🦖</h1>
    
    <div id="status-box">
        <button class="btn-connect" id="connect-btn">۱. اتصال کیف پول (Base Sepolia)</button>
        <span id="wallet-address" style="margin-right:15px;">وضعیت: متصل نیست</span>
    </div>

    <div id="game-container">
        <div id="dino"></div>
        <div id="cactus"></div>
    </div>

    <div id="score-board">HI SCORE: <span id="current-score">0</span></div>
    <div id="tx-log">وضعیت تراکنش‌های پرش: منتظر شروع...</div>

    <script>
        // --- تنظیمات بلاکچین و قرارداد هوشمند ---
        let provider, signer, userAddress, gameContract;
        
        // آدرس قراردادی که روی ریمیکس ساختید را اینجا بگذارید
        const contractAddress = "0xaf8FB38EC9f8301a401B4f18bb3dEdb3F029E54c"; 
        const contractABI = [
            "function recordJumps(uint256 _jumpCount) public"
        ];

        // اتصال به متامسک
        document.getElementById("connect-btn").addEventListener("click", async () => {
            if (window.ethereum) {
                try {
                    provider = new ethers.BrowserProvider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = await provider.getSigner();
                    userAddress = await signer.getAddress();
                    gameContract = new ethers.Contract(contractAddress, contractABI, signer);
                    
                    document.getElementById("wallet-address").innerText = `متصل به: ${userAddress.substring(0,6)}...`;
                    document.getElementById("connect-btn").innerText = "متصل شد ✅";
                    startGame(); // شروع بازی بعد از اتصال موفقیت‌آمیز
                } catch (err) {
                    alert("خطا در اتصال به کیف پول.");
                }
            } else {
                alert("لطفاً متامسک را نصب کنید.");
            }
        });

        // --- بخش موتور بازی دایناسور ---
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const currentScoreIdx = document.getElementById("current-score");
        const txLog = document.getElementById("tx-log");
        
        let score = 0;
        let isJumping = false;
        let gameInterval;
        let cactusPosition = 600;
        let canScore = true; // برای اینکه هر مانع فقط یکبار امتیاز و تراکنش ثبت کند

        // پریدن با کلید Space یا کلیک روی صفحه
        document.addEventListener("keydown", function(event) {
            if ((event.code === "Space" || event.type === "click") && !isJumping) {
                isJumping = true;
                dino.classList.add("jump");
                setTimeout(() => {
                    dino.classList.remove("jump");
                    isJumping = false;
                }, 600);
            }
        });

        function startGame() {
            if(!gameContract) {
                txLog.innerText = "❌ ابتدا کیف پول را متصل کنید تا بازی شروع شود.";
                return;
            }
            score = 0;
            currentScoreIdx.innerText = score;
            cactusPosition = 600;
            canScore = true;
            
            clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                cactusPosition -= 8; // سرعت حرکت مانع
                if (cactusPosition < -20) {
                    cactusPosition = 600;
                    canScore = true; // مانع جدید آمد، آماده برای پرش بعدی
                }
                cactus.style.left = cactusPosition + "px";

                // بررسی پرش موفق (وقتی مانع از دایناسور عبور میکند)
                if (cactusPosition < 40 && canScore) {
                    let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
                    if (dinoBottom > 35) { // دایناسور بالا روی هواست و مانع رد شد
                        score++;
                        currentScoreIdx.innerText = score;
                        canScore = false; // قفل کردن تا مانع بعدی
                        
                        // 🔥 ارسال تراکنش کاملاً خودکار روی شبکه Base به محض پرش موفق
                        sendAutoTx();
                    }
                }

                // بررسی برخورد و باختن
                let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
                if (cactusPosition > 30 && cactusPosition < 60 && dinoBottom <= 35) {
                    txLog.innerText = "💥 برخورد انجام شد! بازی تمام شد. برای شروع دوباره صفحه را رفرش کنید.";
                    clearInterval(gameInterval);
                }
            }, 20);
        }

        // تابع ارسال خودکار تراکنش در پس‌زمینه
        async function sendAutoTx() {
            if (!gameContract) return;
            try {
                txLog.innerText = `⏳ پرش موفق! در حال ارسال تراکنش خودکار برای پرش شماره ${score}...`;
                
                // فراخوانی تابع قرارداد هوشمند با مقدار ۱ پرش
                const tx = await gameContract.recordJumps(1);
                
                txLog.innerText = `🔗 تراکنش پرش ${score} فرستاده شد. هش: ${tx.hash.substring(0,10)}...`;
                // صبر نمیکنیم تا بازی قفل نشود، تاییدیه در پس‌زمینه انجام می‌شود
                tx.wait().then(() => {
                    console.log(`تراکنش پرش ${score} روی Base تایید شد.`);
                });
            } catch (error) {
                console.error(error);
                txLog.innerText = `❌ تراکنش پرش شماره ${score} توسط کاربر لغو شد یا خطا داد.`;
            }
        }
    </script>
</body>
</html>
