<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دایناسور کروم روی شبکه Base</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: monospace;
            text-align: center;
            background-color: #f7f7f7;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 150px;
            background-color: #fff;
            border-bottom: 2px solid #535353;
            margin: 20px auto;
            overflow: hidden;
            display: none; /* بازی تا قبل از اتصال ولت و زدن استارت مخفی است */
        }
        #dino {
            position: absolute;
            width: 20px;
            height: 40px;
            background-color: #535353;
            bottom: 0;
            left: 40px;
        }
        #cactus {
            position: absolute;
            width: 15px;
            height: 35px;
            background-color: #ff4a4a;
            bottom: 0;
            left: 600px;
        }
        .jump {
            animation: jump-anim 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes jump-anim {
            0% { bottom: 0; }
            50% { bottom: 90px; }
            100% { bottom: 0; }
        }
        #status-box {
            margin: 15px auto;
            padding: 20px;
            width: 560px;
            background: #eef;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn-web3 {
            background-color: #0052FF;
            color: white;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border-radius: 5px;
        }
        #start-btn {
            background-color: #28a745; /* رنگ سبز برای دکمه استارت */
            display: none; /* در ابتدا مخفی است */
        }
        #score-board { font-size: 20px; font-weight: bold; margin-top: 10px; display: none; }
        #tx-log { color: #0052FF; font-size: 14px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>T-Rex Base Runner 🦖</h1>
    
    <div id="status-box">
        <p id="instruction-text">برای شروع، ابتدا باید کیف پول خود را متصل کنید.</p>
        <button class="btn-web3" id="connect-btn">اتصال کیف پول</button>
        <button class="btn-web3" id="start-btn">شروع بازی 🏁</button>
        <div id="wallet-address" style="margin-top: 10px; color: #666;">وضعیت: متصل نیست</div>
    </div>

    <div id="game-container">
        <div id="dino"></div>
        <div id="cactus"></div>
    </div>

    <div id="score-board">HI SCORE: <span id="current-score">0</span></div>
    <div id="tx-log"></div>

    <script>
        let provider, signer, userAddress, gameContract;
        
        // آدرس قرارداد هوشمند خودت رو اینجا بذار
        const contractAddress = "0xaf8FB38EC9f8301a401B4f18bb3dEdb3F029E54c"; 
        const contractABI = ["function recordJumps(uint256 _jumpCount) public"];

        const connectBtn = document.getElementById("connect-btn");
        const startBtn = document.getElementById("start-btn");
        const instructionText = document.getElementById("instruction-text");
        const gameContainer = document.getElementById("game-container");
        const scoreBoard = document.getElementById("score-board");
        const txLog = document.getElementById("tx-log");
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const currentScoreIdx = document.getElementById("current-score");

        let score = 0;
        let isJumping = false;
        let gameInterval;
        let cactusPosition = 600;
        let canScore = true;
        let isGameRunning = false;

        // ۱. دکمه اتصال به متامسک
        connectBtn.addEventListener("click", async () => {
            if (window.ethereum) {
                try {
                    txLog.innerText = "لطفاً اتصال را در متامسک تایید کنید...";
                    provider = new ethers.BrowserProvider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = await provider.getSigner();
                    userAddress = await signer.getAddress();
                    gameContract = new ethers.Contract(contractAddress, contractABI, signer);
                    
                    document.getElementById("wallet-address").innerText = `متصل به: ${userAddress.substring(0,6)}...${userAddress.substring(38)}`;
                    
                    // تغییر دکمه‌ها پس از اتصال موفق
                    connectBtn.style.display = "none";
                    startBtn.style.display = "inline-block";
                    instructionText.innerText = "کیف پول متصل شد! هر زمان آماده بودید دکمه شروع را بزنید.";
                    txLog.innerText = "";
                } catch (err) {
                    console.error(err);
                    txLog.innerText = "❌ خطا در اتصال به کیف پول.";
                }
            } else {
                alert("لطفاً افزونه متامسک را روی مرورگر خود نصب کنید.");
            }
        });

        // ۲. دکمه شروع بازی
        startBtn.addEventListener("click", () => {
            document.getElementById("status-box").style.display = "none"; // مخفی کردن کامل باکس راهنما
            gameContainer.style.display = "block"; // نمایش محیط بازی
            scoreBoard.style.display = "block"; // نمایش امتیاز
            txLog.innerText = "بازی شروع شد! با دکمه Space بپرید.";
            isGameRunning = true;
            startGame();
        });

        // کنترل پرش با دکمه Space
        document.addEventListener("keydown", function(event) {
            if (event.code === "Space" && !isJumping && isGameRunning) {
                isJumping = true;
                dino.classList.add("jump");
                setTimeout(() => {
                    dino.classList.remove("jump");
                    isJumping = false;
                }, 600);
            }
        });

        // موتور اصلی بازی
        function startGame() {
            score = 0;
            currentScoreIdx.innerText = score;
            cactusPosition = 600;
            canScore = true;
            
            clearInterval(gameInterval);
            
            gameInterval = setInterval(() => {
                cactusPosition -= 6; // سرعت حرکت مانع قرمز
                
                if (cactusPosition < -20) {
                    cactusPosition = 600; 
                    canScore = true; 
                }
                cactus.style.left = cactusPosition + "px";

                // محاسبات عبور موفقیت‌آمیز
                if (cactusPosition < 40 && canScore) {
                    let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
                    if (dinoBottom > 40) { 
                        score++;
                        currentScoreIdx.innerText = score;
                        canScore = false; 
                        sendAutoTx(); // ارسال تراکنش خودکار
                    }
                }

                // محاسبات برخورد (باختن)
                let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
                if (cactusPosition > 30 && cactusPosition < 60 && dinoBottom <= 35) {
                    txLog.innerText = "💥 برخورد انجام شد! بازی تمام شد. برای شروع دوباره صفحه را رفرش (F5) کنید.";
                    isGameRunning = false;
                    clearInterval(gameInterval);
                }
            }, 20);
        }

        // ارسال تراکنش خودکار
        async function sendAutoTx() {
            try {
                txLog.innerText = `⏳ پرش موفقیت‌آمیز! درخواست تراکنش ${score} به متامسک فرستاده شد...`;
                const tx = await gameContract.recordJumps(1);
                txLog.innerText = `🔗 تراکنش پرش ${score} ارسال شد! در حال تایید در شبکه Base...`;
                
                tx.wait().then(() => {
                    txLog.innerText = `✅ تراکنش پرش ${score} با موفقیت در شبکه ثبت شد.`;
                });
            } catch (error) {
                txLog.innerText = "❌ تراکنش توسط کاربر لغو شد یا شبکه خطا داد.";
            }
        }
    </script>
</body>
</html>
