<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی پرش Base</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 200px;
            background-color: #fff;
            border: 4px solid #0052FF; /* رنگ آبی شبکه Base */
            margin: 20px auto;
            overflow: hidden;
            border-radius: 8px;
        }
        #dino {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #ff4a4a;
            bottom: 0;
            left: 50px;
            border-radius: 4px;
        }
        #cactus {
            position: absolute;
            width: 20px;
            height: 40px;
            background-color: #333;
            bottom: 0;
            right: -20px;
        }
        .jump {
            animation: jump-anim 0.5s linear;
        }
        @keyframes jump-anim {
            0% { bottom: 0; }
            50% { bottom: 100px; }
            100% { bottom: 0; }
        }
        button {
            background-color: #0052FF;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:disabled { background-color: #ccc; }
        #score-board { font-size: 18px; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

    <h1>بازی پرش بلاکچینی (Base)</h1>
    
    <button id="connect-btn">اتصال به کیف پول</button>
    <p id="wallet-address">کیف پول متصل نیست</p>

    <div id="game-container">
        <div id="dino"></div>
        <div id="cactus"></div>
    </div>

    <div id="score-board">پرش‌های موفق این دور: <span id="current-score">0</span></div>
    <button id="submit-btn" disabled>ثبت امتیاز در شبکه Base</button>

    <script>
        // --- بخش بازی ---
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const currentScoreIdx = document.getElementById("current-score");
        
        let score = 0;
        let isJumping = false;
        let gameInterval;
        let cactusPosition = 600;

        // پرش با دکمه Space
        document.addEventListener("keydown", function(event) {
            if (event.code === "Space" && !isJumping) {
                isJumping = true;
                dino.classList.add("jump");
                setTimeout(() => {
                    dino.classList.remove("jump");
                    isJumping = false;
                }, 500);
            }
        });

        // منطق حرکت مانع و برخورد
        function startGame() {
            score = 0;
            currentScoreIdx.innerText = score;
            cactusPosition = 600;
            
            gameInterval = setInterval(() => {
                cactusPosition -= 6;
                if (cactusPosition < -20) {
                    cactusPosition = 600;
                    score++; // پرش موفقیت‌آمیز بود
                    currentScoreIdx.innerText = score;
                }
                cactus.style.left = cactusPosition + "px";

                // بررسی برخورد
                let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
                if (cactusPosition > 50 && cactusPosition < 90 && dinoBottom <= 40) {
                    alert("باختی! امتیاز شما: " + score);
                    clearInterval(gameInterval);
                    document.getElementById("submit-btn").disabled = (score === 0 || !userAddress);
                }
            }, 20);
        }

        // شروع خودکار بازی
        startGame();


        // --- بخش Web3 و اتصال به Base ---
        let provider;
        let signer;
        let userAddress = null;

        // آدرس و ABI قرارداد هوشمندی که روی Base دیپلو می‌کنید
        const contractAddress = "0xaf8FB38EC9f8301a401B4f18bb3dEdb3F029E54c"; // آدرس قرارداد خودت رو اینجا بذار
        const contractABI = [
            "function recordJumps(uint256 _jumpCount) public"
        ];

        const connectBtn = document.getElementById("connect-btn");
        const submitBtn = document.getElementById("submit-btn");

        connectBtn.addEventListener("click", async () => {
            if (window.ethereum) {
                try {
                    provider = new ethers.BrowserProvider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = await provider.getSigner();
                    userAddress = await signer.getAddress();
                    
                    document.getElementById("wallet-address").innerText = `متصل شد به: ${userAddress.substring(0,6)}...${userAddress.substring(38)}`;
                    connectBtn.innerText = "متصل شد";
                } catch (err) {
                    alert("اتصال به کیف پول لغو شد.");
                }
            } else {
                alert("لطفاً متامسک یا یک کیف پول Web3 نصب کنید.");
            }
        });

        submitBtn.addEventListener("click", async () => {
            if (!signer) return alert("ابتدا کیف پول را متصل کنید.");
            
            submitBtn.innerText = "در حال ارسال تراکنش...";
            submitBtn.disabled = true;

            try {
                const contract = new ethers.Contract(contractAddress, contractABI, signer);
                // ارسال تراکنش ثبت رکورد به شبکه Base
                const tx = await contract.recordJumps(score);
                alert("تراکنش فرستاده شد! منتظر تایید شبکه بمانید...");
                await tx.wait();
                alert("امتیاز شما با موفقیت روی زنجیره Base ثبت شد! 🎉");
                startGame(); // بازی از اول شروع میشه
            } catch (error) {
                console.error(error);
                alert("خطا در ثبت تراکنش.");
                submitBtn.disabled = false;
                submitBtn.innerText = "ثبت امتیاز در شبکه Base";
            }
        });
    </script>
</body>
</html>
